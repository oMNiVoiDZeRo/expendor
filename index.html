<!doctype html>
<html>
<head>
<title>Expendor</title>
<style>
	html, body {
		margin: 0;
		padding: 0;
		width: 100%;
		height: 100%;
	}
	
	body {
		background: url('background.jpg') center center no-repeat #000;
		background-size: cover;
	}
	
	body a {
		position: absolute;
		display: block;
		top: 50%;
		left: 50%;
		transform: translate(-50%,-50%);
	}
	
	body a img {
		transition: 1s all ease;
		transform: scale(1);
	}
	
	body a:hover img {
		transition: 1s all ease;
		transform: scale(1.2);
	}
	
	
</style>
</head>
<body>
<a href="dashboard/"><img src="logo.png" alt="Expendor" /></a>
</body>
</html>
